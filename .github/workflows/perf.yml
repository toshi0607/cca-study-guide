name: Performance budget

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    env:
      PUBLIC_GA_MEASUREMENT_ID: G-TEST123456
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check design tokens (no raw colours/sizes outside tokens.css)
        run: node scripts/check-design-tokens.mjs
      - run: pnpm test
      - run: pnpm build
      - name: Check initial bundle (no heavy chunks eagerly loaded)
        run: node scripts/check-initial-bundle.mjs
      - name: Serve production build
        run: |
          pnpm preview --host 127.0.0.1 --port 4321 &
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://127.0.0.1:4321/ && break
            sleep 1
          done
      - name: Run Lighthouse (3 runs, mobile)
        run: |
          mkdir -p tmp/lighthouse-ci
          for i in 1 2 3; do
            npx --yes lighthouse@13 http://127.0.0.1:4321/ \
              --quiet --only-categories=performance --output=json \
              --output-path=tmp/lighthouse-ci/run$i.json \
              --chrome-flags='--headless --no-sandbox'
          done
      - name: Check performance budget
        run: node scripts/check-lighthouse-budget.mjs tmp/lighthouse-ci/run1.json tmp/lighthouse-ci/run2.json tmp/lighthouse-ci/run3.json
      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lighthouse-reports
          path: tmp/lighthouse-ci/
