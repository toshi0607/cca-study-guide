name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    env:
      PUBLIC_GA_MEASUREMENT_ID: G-TEST123456
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Only Chromium is exercised (see playwright.config.ts projects).
      - run: pnpm exec playwright install --with-deps chromium
      # webServer builds a fresh production preview and runs the full suite at
      # the committed worker count (playwright.config.ts default = 1; a sweep
      # found 2 workers flaky on this suite). This is the merge gate — never the
      # fast or reuse variants, so it can't run against a stale build or skip
      # @slow. To try parallel on a beefier runner, set PW_WORKERS here.
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
